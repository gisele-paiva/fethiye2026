// ── Supabase shared state hook ────────────────────────────────────────────────
function useShared(key, init) {
  const [data, setData] = useState(null);

  useEffect(() => {
    if (!sb) {
      setData(ls(key, init));
      return;
    }
    // Initial fetch
    sb.from('sailing_data').select('value').eq('key', key).single().then(({data: row, error}) => {
      if (row) {
        setData(row.value);
      } else {
        // First run — seed with defaults
        sb.from('sailing_data').upsert({key, value: init});
        setData(init);
      }
    });
    // Realtime subscription
    const channel = sb.channel('sailing_' + key)
      .on('postgres_changes', {event: '*', schema: 'public', table: 'sailing_data', filter: `key=eq.${key}`},
        (payload) => { if (payload.new?.value !== undefined) setData(payload.new.value); })
      .subscribe();
    return () => sb.removeChannel(channel);
  }, []);

  const update = useCallback((fn) => {
    setData(prev => {
      if (prev === null) return prev;
      const next = typeof fn === 'function' ? fn(prev) : fn;
      if (sb) sb.from('sailing_data').upsert({key, value: next}).catch(e => console.error(e));
      else ss(key, next);
      return next;
    });
  }, [key]);

  return [data, update];
}

// ── Supabase connection indicator ─────────────────────────────────────────────
function useSyncStatus() {
  const [status, setStatus] = useState(SB_READY ? 'connecting' : 'local');
  useEffect(() => {
    if (!sb) return;
    const channel = sb.channel('_status_ping')
      .subscribe((s) => {
        if (s === 'SUBSCRIBED') setStatus('synced');
        else if (s === 'CHANNEL_ERROR' || s === 'TIMED_OUT') setStatus('offline');
      });
    return () => sb.removeChannel(channel);
  }, []);
  return status;
}

// ── Inline editable components ─────────────────────────────────────────────
function EditableText({value,onChange,className="",multiline=false,placeholder=""}){
  const [editing,setEditing]=useState(false);
  const [draft,setDraft]=useState(value);
  const ref=useRef();
  useEffect(()=>setDraft(value),[value]);
  const commit=()=>{setEditing(false);if(draft!==value)onChange(draft);};
  if(!editing)return(
    <span className={`cursor-pointer hover:bg-yellow-50 hover:outline hover:outline-1 hover:outline-yellow-300 rounded px-0.5 ${className}`}
      title="Click to edit" onClick={()=>{setEditing(true);setTimeout(()=>ref.current?.focus(),50)}}>
      {value||<span className="text-gray-400 italic">{placeholder||"(click to edit)"}</span>}
    </span>
  );
  if(multiline)return(
    <textarea ref={ref} className={`w-full border rounded p-1 text-sm ${className}`} value={draft} rows={3}
      onChange={e=>setDraft(e.target.value)} onBlur={commit}
      onKeyDown={e=>e.key==="Escape"&&(setDraft(value),setEditing(false))}/>
  );
  return(
    <input ref={ref} className={`border rounded px-1 py-0.5 text-sm w-full ${className}`} value={draft} placeholder={placeholder}
      onChange={e=>setDraft(e.target.value)} onBlur={commit}
      onKeyDown={e=>{if(e.key==="Enter")commit();if(e.key==="Escape"){setDraft(value);setEditing(false);}}}/>
  );
}

function EditableNumber({value,onChange,min=0,step=0.5}){
  const [editing,setEditing]=useState(false);
  const [draft,setDraft]=useState(value);
  const ref=useRef();
  useEffect(()=>setDraft(value),[value]);
  const commit=()=>{setEditing(false);const n=parseFloat(draft);if(!isNaN(n)&&n!==value)onChange(n);};
  if(!editing)return(
    <span className="cursor-pointer font-bold hover:bg-yellow-50 hover:outline hover:outline-1 hover:outline-yellow-300 rounded px-1"
      title="Click to edit qty" onClick={()=>{setEditing(true);setTimeout(()=>ref.current?.focus(),50)}}>
      {value}
    </span>
  );
  return(
    <input ref={ref} type="number" min={min} step={step} className="border rounded px-1 py-0.5 w-16 text-sm"
      value={draft} onChange={e=>setDraft(e.target.value)} onBlur={commit}
      onKeyDown={e=>{if(e.key==="Enter")commit();if(e.key==="Escape"){setDraft(value);setEditing(false);}}}/>
  );
}

                    </span>

}

function MealsTab({meals,setMeals,shopping,setShopping,schedule,locked,logChange}){
  if(locked) return(
    <div className="max-w-5xl mx-auto p-4 flex flex-col items-center justify-center min-h-[40vh] text-center">
      <div className="text-5xl mb-4">🔒</div>
      <h3 className="text-lg font-bold text-slate-700 mb-2">Meal plan not available yet</h3>
      <p className="text-sm text-slate-400 max-w-xs">The meal plan will be unlocked soon. Check the Schedule tab for the overview.</p>
    </div>
  );
  const [recipeFor,setRecipeFor]=useState(null);
  const mealCookGroup=Object.fromEntries((schedule||[]).filter(r=>r.mealId).map(r=>[r.mealId,r.cook]));
  const update=(id,patch)=>{
    const meal=meals.find(m=>m.id===id);
    setMeals(ms=>ms.map(m=>m.id===id?{...m,...patch}:m));
    if(!meal) return;
    if('done' in patch) logChange("Meals",`${meal.day} · ${meal.dish}: marked as ${patch.done?'✓ done':'undone'}`);
    else if('dish' in patch) logChange("Meals",`${meal.day} · ${meal.meal}: dish renamed`,meal.dish,patch.dish);
    else if('desc' in patch) logChange("Meals",`${meal.day} · ${meal.dish}: description updated`,meal.desc,patch.desc);
    else if('note' in patch) logChange("Meals",`${meal.day} · ${meal.dish}: dietary note updated`,meal.note||"",patch.note||"");
  };
  const done=meals.filter(m=>m.done).length;
  const days=[...new Set(meals.map(m=>m.day))];
  return(
    <div className="max-w-5xl mx-auto p-4">
      <div className="flex items-center justify-between mb-3">
        <h2 className="text-xl font-bold text-slate-800">🍽️ Meal Plan</h2>
        <div className="flex items-center gap-3">
          <span className="text-sm text-slate-500">{done}/{meals.length} cooked</span>
          <div className="w-32 h-2 bg-slate-200 rounded-full"><div className="h-2 bg-green-500 rounded-full transition-all" style={{width:`${(done/meals.length)*100}%`}}/></div>
        </div>
      </div>
      <p className="text-xs text-slate-400 mb-4 italic">💡 Click any dish name, description or note to edit. Hit 📖 to see the full recipe and linked ingredients.</p>
      {days.map(day=>(
        <div key={day} className="mb-6">
          <div className="flex items-center gap-2 mb-2">
            <span className="bg-slate-700 text-white text-xs font-bold px-2 py-1 rounded">{day}</span>
            <span className="text-xs text-slate-400">{meals.find(m=>m.day===day)?.date}</span>
          </div>
          <div className="grid gap-3 md:grid-cols-2 lg:grid-cols-3">
            {meals.filter(m=>m.day===day).map(meal=>{
              const cookGroup=mealCookGroup[meal.id];
              const gs=GROUP_STYLE[cookGroup]||{bg:"bg-gray-100",text:"text-gray-700",border:"border-gray-300"};
              return(
                <div key={meal.id} className={`rounded-xl border-2 p-4 bg-white shadow-sm transition-all ${meal.done?'opacity-55 border-green-400':gs.border}`}>
                  <div className="flex items-start justify-between mb-2">
                    <div className="flex gap-1 flex-wrap">
                      <span className="text-xs bg-slate-100 text-slate-600 px-2 py-0.5 rounded font-medium">{meal.meal}</span>
                      {cookGroup&&cookGroup!=="ALL"&&<span className={`text-xs ${gs.bg} ${gs.text} px-2 py-0.5 rounded font-medium`}>Group {cookGroup}</span>}
                      {cookGroup==="ALL"&&<span className="text-xs bg-purple-100 text-purple-800 px-2 py-0.5 rounded font-medium">All Hands</span>}
                    </div>
                    <div className="flex gap-1 flex-shrink-0">
                      <button onClick={()=>setRecipeFor(meal)}
                        className="text-xs px-2 py-1 rounded-lg border border-amber-300 text-amber-700 bg-amber-50 hover:bg-amber-100" title="View recipe">
                        📖
                      </button>
                      <button onClick={()=>update(meal.id,{done:!meal.done})}
                        className={`text-xs font-bold px-2 py-1 rounded-lg border transition-all ${meal.done?'bg-green-100 text-green-700 border-green-400':'bg-white text-slate-500 border-slate-300 hover:border-green-400 hover:text-green-600'}`}>
                        {meal.done?'✓':'Done'}
                      </button>
                    </div>
                  </div>
                  <div className="text-base font-semibold text-slate-800 mb-1">
                    <EditableText value={meal.dish} onChange={v=>update(meal.id,{dish:v})} placeholder="Dish name"/>
                  </div>
                  <div className="text-xs text-slate-500 mb-2 leading-snug">
                    <EditableText value={meal.desc} onChange={v=>update(meal.id,{desc:v})} multiline placeholder="Description..."/>
                  </div>
                  {meal.note&&(
                    <div className="text-xs text-blue-600 bg-blue-50 rounded p-1.5 border border-blue-100">
                      <EditableText value={meal.note} onChange={v=>update(meal.id,{note:v})} placeholder="Dietary note..."/>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      ))}
      {recipeFor&&<RecipeModal meal={recipeFor} setMeals={setMeals} shopping={shopping} setShopping={setShopping} logChange={logChange} onClose={()=>setRecipeFor(null)}/>}
    </div>
  );
}

// ── Shopping Tab ───────────────────────────────────────────────────────────
function ShoppingTab({shopping,setShopping,locked,logChange}){
  if(locked) return(
    <div className="max-w-5xl mx-auto p-4 flex flex-col items-center justify-center min-h-[40vh] text-center">
      <div className="text-5xl mb-4">🔒</div>
      <h3 className="text-lg font-bold text-slate-700 mb-2">Shopping list not available yet</h3>
      <p className="text-sm text-slate-400 max-w-xs">The shopping list will be unlocked closer to departure. Check back soon!</p>
    </div>
  );
  const [filter,setFilter]=useState("all");
  const [whenFilter,setWhenFilter]=useState("all");
  const [search,setSearch]=useState("");
  const [showAdd,setShowAdd]=useState(false);
  const [collapsed,setCollapsed]=useState({});
  const update=(id,patch)=>{
    const item=shopping.find(x=>x.id===id);
    setShopping(s=>s.map(x=>x.id===id?{...x,...patch}:x));
    if(!item) return;
    if('checked' in patch) logChange("Shopping",`${item.item}: ${patch.checked?'✓ added to cart':'removed from cart'}`);
    else if('qty' in patch) logChange("Shopping",`${item.item}: qty changed`,`${item.qty} ${item.unit}`,`${patch.qty} ${item.unit}`);
    else if('item' in patch) logChange("Shopping",`Item renamed`,item.item,patch.item);
  };
  const del=(id)=>{
    const item=shopping.find(x=>x.id===id);
    setShopping(s=>s.filter(x=>x.id!==id));
    if(item) logChange("Shopping",`"${item.item}" removed from list`);
  };
  const add=(item)=>{
    setShopping(s=>[...s,{...item,id:"s"+uid(),checked:false}]);
    logChange("Shopping",`New item added: "${item.item}" (${item.qty} ${item.unit})`);
  };
  const cats=[...new Set(shopping.map(x=>x.cat))];
  const checked=shopping.filter(x=>x.checked).length;
  const visible=(item)=>{
    if(filter==="unchecked"&&item.checked)return false;
    if(filter==="checked"&&!item.checked)return false;
    if(whenFilter!=="all"&&item.when!==whenFilter)return false;
    if(search&&!item.item.toLowerCase().includes(search.toLowerCase()))return false;
    return true;
  };
  return(
    <div className="max-w-5xl mx-auto p-4">
      <div className="flex flex-wrap items-center justify-between gap-3 mb-4">
        <h2 className="text-xl font-bold text-slate-800">🛒 Shopping List</h2>
        <div className="flex items-center gap-3">
          <span className="text-sm text-slate-500">{checked}/{shopping.length} in cart</span>
          <div className="w-24 h-2 bg-slate-200 rounded-full"><div className="h-2 bg-blue-500 rounded-full transition-all" style={{width:`${(checked/shopping.length)*100}%`}}/></div>
        </div>
      </div>
      <div className="flex flex-wrap gap-2 mb-3">
        <input className="border rounded-lg px-3 py-1.5 text-sm w-48" placeholder="🔍 Search..." value={search} onChange={e=>setSearch(e.target.value)}/>
        <select className="text-sm py-1.5" value={filter} onChange={e=>setFilter(e.target.value)}>
          <option value="all">All items</option>
          <option value="unchecked">Still to buy</option>
          <option value="checked">In cart ✓</option>
        </select>
        <select className="text-sm py-1.5" value={whenFilter} onChange={e=>setWhenFilter(e.target.value)}>
          <option value="all">All — when to buy</option>
          {Object.entries(WHEN).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}
        </select>
        <button onClick={()=>{setShopping(s=>s.map(x=>({...x,checked:false})));logChange("Shopping","All cart checkmarks cleared");}}
          className="text-xs border border-slate-300 text-slate-500 px-2 py-1.5 rounded-lg hover:bg-slate-50">Clear all ✓</button>
        <button onClick={()=>setShowAdd(true)} className="ml-auto bg-blue-600 text-white text-sm px-3 py-1.5 rounded-lg hover:bg-blue-700 font-medium">+ Add item</button>
      </div>
      <div className="flex gap-2 flex-wrap text-xs mb-3">
        {Object.entries(WHEN).map(([k,v])=><span key={k} className={`${v.bg} ${v.text} px-2 py-0.5 rounded font-medium`}>{v.label}</span>)}
        <span className="text-slate-400 ml-1">Click qty or name to edit. ✕ to remove.</span>
      </div>
      {cats.map(cat=>{
        const items=shopping.filter(x=>x.cat===cat&&visible(x));
        if(!items.length)return null;
        const catChecked=items.filter(x=>x.checked).length;
        const col=collapsed[cat];
        return(
          <div key={cat} className="mb-3 rounded-xl border border-slate-200 overflow-hidden shadow-sm">
            <button className="w-full flex items-center justify-between px-4 py-2.5 bg-slate-50 hover:bg-slate-100 text-left"
              onClick={()=>setCollapsed(c=>({...c,[cat]:!c[cat]}))}>
              <span className="font-semibold text-slate-700 text-sm">{cat}</span>
              <span className="text-slate-400 text-sm">{col?'▼':'▲'} {catChecked}/{items.length}</span>
            </button>
            {!col&&(
              <div className="divide-y divide-slate-100">
                {items.map(item=>(
                  <div key={item.id} className={`flex items-center gap-2 px-4 py-2 ${item.checked?'bg-slate-50':'bg-white'} hover:bg-slate-50`}>
                    <input type="checkbox" checked={item.checked} onChange={e=>update(item.id,{checked:e.target.checked})}
                      className="w-4 h-4 accent-blue-600 cursor-pointer flex-shrink-0"/>
                    <div className={`flex-1 min-w-0 ${item.checked?'line-through text-slate-400':''}`}>
                      <div className="flex items-center gap-2 flex-wrap">
                        <EditableText value={item.item} onChange={v=>update(item.id,{item:v})}
                          className={`text-sm font-medium ${item.checked?'text-slate-400':'text-slate-800'}`}/>
                        <span className="text-sm flex-shrink-0">
                          <EditableNumber value={item.qty} onChange={v=>update(item.id,{qty:v})}/> {item.unit}
                        </span>
                        <span className={`text-xs px-1.5 py-0.5 rounded flex-shrink-0 ${WHEN[item.when]?.bg||'bg-slate-100'} ${WHEN[item.when]?.text||'text-slate-600'}`}>
                          {WHEN[item.when]?.label||item.when}
                        </span>
                      </div>
                      {(item.usedIn||item.notes)&&(
                        <div className="text-xs text-slate-400 mt-0.5 truncate">{item.usedIn}{item.notes?` · ${item.notes}`:''}</div>
                      )}
                    </div>
                    <button onClick={()=>del(item.id)} className="text-slate-300 hover:text-red-400 text-lg leading-none flex-shrink-0" title="Remove">×</button>
                  </div>
                ))}
              </div>
            )}
          </div>
        );
      })}
      {showAdd&&<AddItemModal cats={cats} onAdd={add} onClose={()=>setShowAdd(false)}/>}
    </div>
  );
}

// ── Coffee Tab ─────────────────────────────────────────────────────────────
function CoffeeTab({crew,setCrew,logChange}){
  const update=(id,patch)=>{
    const person=crew.find(x=>x.id===id);
    setCrew(c=>c.map(x=>x.id===id?{...x,...patch}:x));
    if(!person) return;
    if('coffeeType' in patch||'tea' in patch)
      logChange("Coffee",`${person.name}: type → ${patch.tea?"tea":patch.coffeeType}`);
    else if('cups' in patch)
      logChange("Coffee",`${person.name}: cups/day → ${patch.cups}`);
  };
  const updateExtra=(id,idx,patch)=>{
    const person=crew.find(x=>x.id===id);
    setCrew(c=>c.map(x=>{
      if(x.id!==id) return x;
      const extras=[...(x.extras||[])];
      if(patch===null) extras.splice(idx,1);
      else extras[idx]={...extras[idx],...patch};
      return {...x,extras};
    }));
    if(!person) return;
    if(patch===null) logChange("Coffee",`${person.name}: preference #${idx+2} removed`);
    else if(patch.type) logChange("Coffee",`${person.name}: preference #${idx+2} → ${patch.type}`);
  };
  const addExtra=(id)=>{
    setCrew(c=>c.map(x=>x.id!==id?x:{...x,extras:[...(x.extras||[]),{type:"filter",cups:1}]}));
  };
  const days=7;
  const typeOpts=[
    {v:"filter",          l:"☕ Filter coffee"},
    {v:"nespresso",       l:"🫘 Nespresso"},
    {v:"nespresso-decaf", l:"🫘 Nespresso decaf pods"},
    {v:"frappe",          l:"🧊 Frappé"},
    {v:"tea",             l:"🍵 Tea only"},
    {v:"none",            l:"❌ None"},
  ];
  const extraTypeOpts=[
    {v:"filter",          l:"☕ Filter coffee"},
    {v:"nespresso",       l:"🫘 Nespresso"},
    {v:"nespresso-decaf", l:"🫘 Nespresso decaf pods"},
    {v:"frappe",          l:"🧊 Frappé"},
    {v:"tea",             l:"🍵 Tea"},
  ];
  // Migrate old data format on-the-fly
  const normCrew=crew.map(p=>{
    let c={...p};
    if(!c.extras){
      const extras=[];
      if(c.extra?.type){const t=c.extra.type+(c.extra.decaf&&!c.extra.type.includes('decaf')?'-decaf':'');extras.push({type:t,cups:c.extra.cups||1});}
      c.extras=extras;
    }
    if(c.decaf&&c.coffeeType&&!c.coffeeType.includes('decaf'))c={...c,coffeeType:c.coffeeType+'-decaf'};
    return c;
  });
  // Aggregate totals
  const allPrefs=normCrew.flatMap(p=>{
    const mainType=p.tea?"tea":(p.coffeeType||"none");
    const prefs=mainType!=="none"?[{type:mainType,cups:p.cups||0}]:[];
    (p.extras||[]).forEach(e=>{if(e.type)prefs.push({type:e.type,cups:e.cups||1});});
    return prefs;
  });
  const sumCups=(t)=>allPrefs.filter(p=>p.type===t).reduce((a,p)=>a+p.cups,0)*days;
  const pcount=(t)=>allPrefs.filter(p=>p.type===t).length;
  const teaPeople=normCrew.filter(x=>x.tea||(x.extras||[]).some(e=>e.type==="tea")).length;
  const isDrinker=(t,tea)=>t!=="none"&&!tea; // keep for unused compat

  return(
    <div className="max-w-3xl mx-auto p-4">
      <h2 className="text-xl font-bold text-slate-800 mb-1">☕ Coffee & Drinks Survey</h2>
      <p className="text-sm text-slate-500 mb-5">Confirm your preferences. Decaf is in the dropdown. Up to 4 choices per person.</p>
      <div className="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden mb-6">
        <div className="bg-slate-50 px-4 py-2 grid grid-cols-[1fr_1fr_56px] text-xs font-semibold text-slate-500 uppercase tracking-wide gap-2">
          <span>Name</span><span>Type</span><span className="text-center">Cups/day</span>
        </div>
        {normCrew.map(p=>{
          const gs=GROUP_STYLE[p.group];
          const mainType=p.tea?"tea":(p.coffeeType||"none");
          const hasDrink=mainType!=="none";
          const canAdd=(p.extras||[]).length<3;
          return(
            <div key={p.id} className="border-t border-slate-100">
              <div className="px-4 py-2.5 grid grid-cols-[1fr_1fr_56px] items-center gap-2 hover:bg-slate-50">
                <div className="flex items-center gap-2 min-w-0">
                  {gs&&<span className={`text-xs ${gs.bg} ${gs.text} px-1.5 py-0.5 rounded font-medium flex-shrink-0`}>G{p.group}</span>}
                  <EditableText value={p.name} onChange={v=>update(p.id,{name:v})} className="text-sm font-medium text-slate-700 truncate"/>
                </div>
                <select className="text-xs py-1 w-full" value={mainType}
                  onChange={e=>{const v=e.target.value;update(p.id,{coffeeType:v==="tea"?"none":v,tea:v==="tea",cups:v==="none"||v==="tea"?0:p.cups||2});}}>
                  {typeOpts.map(o=><option key={o.v} value={o.v}>{o.l}</option>)}
                </select>
                <div className="flex items-center gap-1 justify-center">
                  {hasDrink&&mainType!=="tea"
                    ?<EditableNumber value={p.cups} onChange={v=>update(p.id,{cups:v})} min={0} step={1}/>
                    :<span className="text-slate-300 text-sm">—</span>}
                  {hasDrink&&<button onClick={()=>update(p.id,{coffeeType:"none",tea:false,cups:0})}
                    className="text-slate-300 hover:text-red-400 text-lg leading-none flex-shrink-0" title="Remove">×</button>}
                </div>
              </div>
              {(p.extras||[]).map((e,ei)=>(
                <div key={ei} className="px-4 pb-1.5 grid grid-cols-[1fr_1fr_56px] items-center gap-2 bg-slate-50/70">
                  <div className="flex items-center pl-6">
                    <span className="text-xs text-slate-400 italic">also:</span>
                  </div>
                  <select className="text-xs py-1 w-full" value={e.type||"filter"}
                    onChange={ev=>updateExtra(p.id,ei,{type:ev.target.value})}>
                    {extraTypeOpts.map(o=><option key={o.v} value={o.v}>{o.l}</option>)}
                  </select>
                  <div className="flex items-center gap-1 justify-center">
                    <EditableNumber value={e.cups||1} onChange={v=>updateExtra(p.id,ei,{cups:v})} min={0} step={1}/>
                    <button onClick={()=>updateExtra(p.id,ei,null)}
                      className="text-slate-300 hover:text-red-400 text-lg leading-none flex-shrink-0" title="Remove">×</button>
                  </div>
                </div>
              ))}
              {canAdd&&(
                <div className="px-4 pb-1.5 pl-16">
                  <button onClick={()=>addExtra(p.id)} className="text-xs text-slate-400 hover:text-blue-600">+ add another type</button>
                </div>
              )}
            </div>
          );
        })}
      </div>
      <div className="grid grid-cols-2 md:grid-cols-3 gap-3">
        {[
          {icon:"☕",label:"Filter Coffee",value:`~${Math.round(sumCups("filter")*10)}g`,sub:`${sumCups("filter")} cups · ${days} days`},
          {icon:"☕",label:"Filter Decaf",value:`~${Math.round(sumCups("filter-decaf")*10)}g`,sub:`${sumCups("filter-decaf")} cups · decaf only`,alert:sumCups("filter-decaf")>0},
          {icon:"🫘",label:"Nespresso",value:`${sumCups("nespresso")} pods`,sub:`${pcount("nespresso")} preference(s)`},
          {icon:"💊",label:"Nespresso Decaf ❗",value:`${sumCups("nespresso-decaf")} pods`,sub:"Must be decaf pods",alert:sumCups("nespresso-decaf")>0},
          {icon:"🧊",label:"Frappé (instant)",value:`~${Math.round(sumCups("frappe")*20)}g`,sub:`${pcount("frappe")} frappé lover(s)`},
          {icon:"🍵",label:"Tea Bags",value:`~${teaPeople*2*days} bags`,sub:`${teaPeople} tea drinker(s)`},
        ].map(c=>(
          <div key={c.label} className={`rounded-xl border p-4 ${c.alert?'bg-purple-50 border-purple-200':'bg-white border-slate-200'}`}>
            <div className="text-2xl mb-1">{c.icon}</div>
            <div className="text-xs text-slate-500 font-medium mb-0.5">{c.label}</div>
            <div className="text-xl font-bold text-slate-800">{c.value}</div>
            <div className="text-xs text-slate-400">{c.sub}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

    const ml=meals.map(m=>`- ${m.day} ${m.meal} (Group ${m.group}): ${m.dish}\n  ${m.desc}`).join("\n");

Return ONLY a JSON array with this structure:
[{"cat":"emoji + category","item":"name","qty":number,"unit":"string","when":"D1|FRESH|TOP","usedIn":"string","notes":"string"}]`;

  if(!unlocked)return(

          <button onClick={tryUnlock} className="flex-1 bg-slate-800 text-white py-2 rounded-lg text-sm font-medium hover:bg-slate-900">Unlock</button>
        </div>
      </div>
    </div>
  );

  const prompt=genPrompt();
  return(
    <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4" onClick={onClose}>

                        }
                      }else alert("Expected a JSON array");
                    }catch(e){alert("Invalid JSON: "+e.message);}
                  }} className="mt-2 bg-green-600 text-white text-sm px-4 py-2 rounded-lg hover:bg-green-700">Import shopping list</button>
                </div>
              </div>
            )}
          </div>
          {/* Supabase deploy */}
          <div className="bg-blue-50 rounded-xl p-4 border border-blue-200 text-sm">
            <h4 className="font-semibold text-blue-800 mb-2">🚀 Deploy to Netlify</h4>
            <ol className="text-xs text-blue-700 space-y-1">
              <li>1. Make sure SUPABASE_URL and SUPABASE_ANON_KEY are filled in (top of the HTML file)</li>
              <li>2. Go to <strong>netlify.com/drop</strong></li>
              <li>3. Drag & drop <strong>sailing_trip.html</strong> into the page</li>
              <li>4. Copy the URL you get (e.g. xyz.netlify.app) and share with the crew</li>
            </ol>
          </div>
          {/* Change Log */}
          <div>
            <div className="flex items-center justify-between mb-3">
              <h4 className="font-semibold text-slate-700">📝 Change Log</h4>
              <div className="flex items-center gap-2">
                <span className="text-xs text-slate-400">{changelog.length} entries</span>
                {changelog.length>0&&<button onClick={()=>setChangelog([])} className="text-xs text-red-400 border border-red-200 px-2 py-1 rounded hover:bg-red-50">Clear</button>}
              </div>
            </div>
            {changelog.length===0
              ?<p className="text-xs text-slate-400 italic text-center py-4">No changes logged yet — edits will appear here.</p>
              :<div className="space-y-1 max-h-72 overflow-y-auto pr-1">
                {changelog.map(entry=>(
                  <div key={entry.id} className="flex items-start gap-2 text-xs bg-slate-50 rounded-lg p-2.5 border border-slate-100">
                    <span className={`flex-shrink-0 px-1.5 py-0.5 rounded font-semibold ${sectionColor(entry.section)}`}>{entry.section}</span>
                    <span className="text-slate-700 flex-1 leading-snug">
                      {entry.msg}
                      {(entry.oldVal!=null||entry.newVal!=null)&&(
                        <span className="block mt-1 text-slate-500">
                          {entry.oldVal!=null&&<span className="line-through text-red-400 mr-1">{entry.oldVal}</span>}
                          {entry.oldVal!=null&&entry.newVal!=null&&<span className="text-slate-300 mr-1">→</span>}
                          {entry.newVal!=null&&<span className="text-green-600">{entry.newVal}</span>}
                        </span>
                      )}
                    </span>
                    <span className="text-slate-400 flex-shrink-0 tabular-nums">{fmtTime(entry.ts)}</span>
                  </div>
                ))}
              </div>
            }
          </div>
          {/* Tab access */}
          <div>
            <h4 className="font-semibold text-slate-700 mb-3">🔒 Tab Access</h4>
            <div className="space-y-2">
              {[
                {label:"🍽️ Meal Plan", locked:mealsLocked, toggle:()=>{setMealsLocked(!mealsLocked);logChange("Admin",`Meals tab ${mealsLocked?"unlocked":"locked"}`);} },
                {label:"🛒 Shopping List", locked:shoppingLocked, toggle:()=>{setShoppingLocked(!shoppingLocked);logChange("Admin",`Shopping tab ${shoppingLocked?"unlocked":"locked"}`);} },
              ].map(({label,locked,toggle})=>(
                <div key={label} className="flex items-center justify-between bg-slate-50 rounded-xl border border-slate-200 px-4 py-3">
                  <div>
                    <div className="text-sm font-medium text-slate-700">{label} — {locked?"locked for crew":"visible to all crew"}</div>
                  </div>
                  <button onClick={toggle}
                    className={`px-4 py-1.5 rounded-lg text-sm font-medium border transition-all ${locked?'bg-green-600 text-white border-green-700 hover:bg-green-700':'bg-red-50 text-red-600 border-red-200 hover:bg-red-100'}`}>
                    {locked?"Unlock":"Lock"}
                  </button>
                </div>
              ))}
            </div>
          </div>
          {/* Reset */}
          <div className="border-t border-slate-100 pt-4">
            <button onClick={resetAll} className="text-sm text-red-500 border border-red-200 px-3 py-1.5 rounded-lg hover:bg-red-50">🔄 Reset all data to defaults</button>
            <span className="text-xs text-slate-400 ml-2">Cannot be undone</span>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── App root ───────────────────────────────────────────────────────────────
function App(){
  const [tab,setTab]=useState("schedule");
  const [meals,setMeals]=useShared("meals",INIT_MEALS);
  const [shopping,setShopping]=useShared("shopping",INIT_SHOPPING);
  const [crew,setCrew]=useShared("crew",INIT_CREW);
  const [schedule,setSchedule]=useShared("schedule",INIT_SCHEDULE);
  const [shoppingLocked,setShoppingLocked]=useShared("shoppingLocked",true);
  const [mealsLocked,setMealsLocked]=useShared("mealsLocked",true);
  const [changelog,setChangelog]=useShared("changelog",[]);
  const [showAdmin,setShowAdmin]=useState(false);
  const syncStatus=useSyncStatus();

  const logChange=useCallback((section,msg,oldVal,newVal)=>{
    setChangelog(cl=>[{id:uid(),ts:Date.now(),section,msg,oldVal,newVal},...(cl||[])].slice(0,300));
  },[]);

  useEffect(()=>{
    const h=e=>{
      setShopping(e.detail);
      logChange("Shopping",`Shopping list imported from AI (${e.detail.length} items)`);
    };
    window.addEventListener("importShopping",h);
    return()=>window.removeEventListener("importShopping",h);
  },[]);

  if(!meals||!shopping||!crew)return(
    <div className="min-h-screen flex items-center justify-center">
      <div className="text-center text-slate-500">
        <div className="text-4xl mb-3">⛵</div>
        <div className="text-lg font-medium">Loading trip data…</div>
        <div className="text-sm mt-1 text-slate-400">{SB_READY?"Connecting to Supabase…":"Starting local mode…"}</div>
      </div>
    </div>
  );

  const doneMeals=meals.filter(m=>m.done).length;
  const boughtItems=shopping.filter(s=>s.checked).length;
  const tabs=[
    {id:"schedule",label:"📋 Schedule", badge:null},
    {id:"coffee",  label:"☕ Coffee",   badge:null},
    {id:"meals",   label:"🍽️ Meals",    badge:doneMeals?`${doneMeals}/${meals.length}`:null, locked:!!mealsLocked},
    {id:"shopping",label:"🛒 Shopping", badge:shoppingLocked?null:(boughtItems?`${boughtItems}/${shopping.length}`:null), locked:!!shoppingLocked},
  ];
  return(
    <div className="min-h-screen">
      <SetupBanner/>
      <div className="bg-white border-b border-slate-200 shadow-sm sticky top-0 z-40">
        <div className="max-w-5xl mx-auto px-4">
          <div className="flex items-center justify-between py-3">
            <div>
              <h1 className="text-lg font-bold text-slate-800">⛵ Fethiye 2026</h1>
              <p className="text-xs text-slate-400">Lycian Coast · 13–20 June · 10 crew</p>
            </div>
            <div className="flex items-center gap-3">
              <SyncDot status={syncStatus}/>
              <button onClick={()=>setShowAdmin(true)}
                className="flex items-center gap-1.5 text-xs border border-slate-300 text-slate-600 px-3 py-1.5 rounded-lg hover:bg-slate-50 font-medium">
                🔑 Admin
              </button>
            </div>
          </div>
          <div className="flex gap-1 -mb-px overflow-x-auto">
            {tabs.map(t=>(
              <button key={t.id} onClick={()=>setTab(t.id)}
                className={`tab-btn px-4 py-2.5 text-sm flex items-center gap-1.5 flex-shrink-0 ${tab===t.id?'active':'text-slate-500 hover:text-slate-700'} ${t.locked?'opacity-40 cursor-not-allowed':''}`}>
                {t.locked&&<span className="text-xs">🔒</span>}
                {t.label}
                {t.badge&&<span className="bg-blue-100 text-blue-700 text-xs font-bold px-1.5 py-0.5 rounded-full">{t.badge}</span>}
              </button>
            ))}
          </div>
        </div>
      </div>
      <div className="pb-12">
        {tab==="meals"   &&<MealsTab meals={meals} setMeals={setMeals} shopping={shopping} setShopping={setShopping} schedule={schedule||INIT_SCHEDULE} locked={!!mealsLocked} logChange={logChange}/>}
        {tab==="shopping"&&<ShoppingTab shopping={shopping} setShopping={setShopping} locked={!!shoppingLocked} logChange={logChange}/>}
        {tab==="schedule"&&<ScheduleTab meals={meals} setMeals={setMeals} schedule={schedule||INIT_SCHEDULE} setSchedule={setSchedule} logChange={logChange}/>}
        {tab==="coffee"  &&<CoffeeTab crew={crew} setCrew={setCrew} logChange={logChange}/>}
      </div>
      {showAdmin&&<AdminModal meals={meals} setShopping={setShopping} shoppingLocked={!!shoppingLocked} setShoppingLocked={setShoppingLocked} mealsLocked={!!mealsLocked} setMealsLocked={setMealsLocked} changelog={changelog||[]} setChangelog={setChangelog} logChange={logChange} onClose={()=>setShowAdmin(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
